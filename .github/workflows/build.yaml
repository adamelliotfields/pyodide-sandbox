name: build

on:
  workflow_dispatch: {}
  push:
    branches: ['main']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: actions/setup-node@v6
        with:
          node-version: 25.5.0
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Check
        run: npm run check
      - name: Build
        run: npm run build:cjs && npm run build:bin
      - name: Test
        run: npm run test
        timeout-minutes: 1
